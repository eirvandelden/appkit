name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  scan_ruby:
    runs-on: ubuntu-slim

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3

      - name: Set up Ruby
        uses: spinel-coop/setup-rv@main
        with:
          ruby-version: current
          install-gems: true

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bundle exec brakeman -p test/dummy --no-pager --ignore-config config/brakeman.ignore

      - name: Scan the engine's own app/lib code for security vulnerabilities
        run: bundle exec brakeman -p . --force-scan --no-pager --ignore-config config/brakeman.gem.ignore

      - name: Scan for known security vulnerabilities in gems used
        run: bundle exec bundler-audit check --update

  lint:
    runs-on: ubuntu-slim
    env:
      RUBOCOP_CACHE_ROOT: tmp/rubocop
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3

      - name: Set up Ruby
        uses: spinel-coop/setup-rv@main
        with:
          ruby-version: current
          install-gems: true

      - name: Prepare RuboCop cache
        uses: actions/cache@v5
        env:
          DEPENDENCIES_HASH: ${{ hashFiles('**/.rubocop.yml', 'Gemfile.lock') }}
        with:
          path: ${{ env.RUBOCOP_CACHE_ROOT }}
          key: rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-${{ github.ref_name == github.event.repository.default_branch && github.run_id || 'default' }}
          restore-keys: |
            rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-

      - name: Lint code for consistent style
        run: bundle exec rubocop -f github

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3

      - name: Set up Ruby
        uses: spinel-coop/setup-rv@main
        with:
          ruby-version: current
          install-gems: true

      - name: Run engine test suite against the dummy app
        run: bundle exec rake test
